name: Deploy PR Preview

on:
  workflow_run:
    workflows: ["Build PR Preview"]
    types:
      - completed

permissions:
  actions: read
  deployments: write
  contents: read
  pull-requests: write
  
jobs:
  deploy-preview:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number
        id: get_pr
        run: |
          PR_NUMBER=$(gh pr list --hash ${{ github.event.workflow_run.head_sha }} --state open --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "No open pull request found for this run. Skipping deployment."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found PR #$PR_NUMBER"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifact
        if: steps.get_pr.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: preview-dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Publish to Cloudflare Pages
        if: steps.get_pr.outputs.exists == 'true'
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
            --branch=pr-${{ steps.get_pr.outputs.pr_number }}

      - name: Comment PR with Preview Link
        if: steps.get_pr.outputs.exists == 'true'
        uses: thollander/actions-comment-pull-request@v3
        with:
          pr-number: ${{ steps.get_pr.outputs.pr_number }}
          message: |
            ### Preview Deployed!

            | Item | Status |
            | :--- | :--- |
            | **Latest Deploy** | [Visit Preview](${{ steps.cloudflare_deploy.outputs.pages-deployment-alias-url }}) |
            | **Environment** | `Preview (PR-${{ steps.get_pr.outputs.pr_number }})` |
            | **Action** | [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            _Last updated at ${{ github.event.workflow_run.updated_at }}_
          comment-tag: preview_deploy_status
